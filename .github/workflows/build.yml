name: Build Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore ManifoldDesktop.vcxproj -PackagesDirectory packages

      - name: Build
        run: msbuild ManifoldDesktop.vcxproj -p:Configuration=Debug -p:Platform=x64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manifold-debug-x64
          path: x64/Debug/
          retention-days: 7
